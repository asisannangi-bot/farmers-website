<!DOCTYPE html>
<html>
<head>

<title>Indian Farmers Support Website</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f0fff0;
text-align:center;
}

header{
background:green;
color:white;
padding:20px;
}

.hero{
padding:40px;
}

.card{
background:white;
width:350px;
margin:20px auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

select,
button{
padding:10px;
width:270px;
margin:10px;
border-radius:5px;
}

button{
background:green;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:darkgreen;
}

#result{
margin-top:20px;
font-size:18px;
color:green;
font-weight:bold;
}

a{
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<header>

<h1>🌱 Indian Farmers Support Website</h1>

<h3>
🇮🇳 Country : India
</h3>

<a href="https://www.india.gov.in"
target="_blank">

Visit India Government Website

</a>

</header>

<section class="hero">

<h2>Welcome Indian Farmers</h2>

<p>

Crop Guidance |
Weather Updates |
Market Prices |
Government Schemes

</p>

<div class="card">

<h3>Select Language</h3>

<select id="language">

<option>English</option>
<option>Hindi</option>
<option>Telugu</option>
<option>Tamil</option>
<option>Kannada</option>
<option>Malayalam</option>
<option>Marathi</option>

</select>

<h3>Select Weather</h3>

<select id="weather">

<option>Rainy</option>
<option>Winter</option>
<option>Summer</option>
<option>Hot and Dry</option>
<option>Cool Climate</option>

</select>

<button onclick="cropSuggestion()">

Get Crop Suggestions

</button>

<h2 id="result"></h2>

</div>

</section>

<script>

function cropSuggestion(){

let weather =
document.getElementById("weather").value;

let result =
document.getElementById("result");

if(weather=="Rainy"){

result.innerHTML =

"🌧️ Best Crops:<br><br>" +

"• Rice<br>" +
"• Sugarcane<br>" +
"• Cotton<br>" +
"• Maize<br>" +
"• Soybean<br>" +
"• Groundnut";

}

else if(weather=="Winter"){

result.innerHTML =

"❄️ Best Crops:<br><br>" +

"• Wheat<br>" +
"• Mustard<br>" +
"• Barley<br>" +
"• Gram<br>" +
"• Peas";

}

else if(weather=="Summer"){

result.innerHTML =

"☀️ Best Crops:<br><br>" +

"• Watermelon<br>" +
"• Muskmelon<br>" +
"• Cucumber<br>" +
"• Pumpkin<br>" +
"• Vegetables";

}

else if(weather=="Hot and Dry"){

result.innerHTML =

"🔥 Best Crops:<br><br>" +

"• Millet<br>" +
"• Sorghum<br>" +
"• Cotton<br>" +
"• Pulses";

}

else{

result.innerHTML =

"🌿 Best Crops:<br><br>" +

"• Apple<br>" +
"• Potato<br>" +
"• Tea<br>" +
"• Carrot";

}

}

</script>

</body>
</html>
